<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIS</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --green: #22c55e; --red: #ef4444; --gray: #9ca3af; }
        body { margin: 0; background: #0b1015; color: #e5e7eb; font-family: system-ui, sans-serif; padding: 2rem; }
        .maps { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 3rem; }
        .map-section h2 { margin: 0 0 0.25rem; font-size: 1.5rem; }
        .map-section p { margin: 0 0 1rem; color: var(--gray); white-space: pre-line; }
        .image-container { position: relative; display: inline-block; }
        .image-container img { max-width: 100%; height: auto; display: block; }
        .image-container svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .rect { fill-opacity: 0.6; stroke-width: 2; pointer-events: all; }
        .rect.green { fill: var(--green); stroke: var(--green); }
        .rect.red { fill: var(--red); stroke: var(--red); }
        .rect.gray { fill: var(--gray); stroke: var(--gray); }
        .label { font-size: 6px; fill: #fff; stroke: rgba(0,0,0,.6); stroke-width: 0; paint-order: stroke; pointer-events: none; }
        .loading { color: var(--gray); font-style: italic; }
        .error { color: var(--red); }
    </style>
</head>
<body>
<div class="maps" id="maps">
    <p class="loading">Loading maps…</p>
</div>
<script>
    const docID = '2PACX-1vTLjPc5F4Jd6LHxDbj2sqrXzcmtkqoezYfAY-WAeVSzlI8DVa0_09urjJlEZe9pw_oeCgSepneiXQQ8';

    function sheetURL(fmt) {
        return `https://docs.google.com/spreadsheets/d/e/${docID}/pub?output=${fmt}`;
    }

    function parseSheetData(sheet) {
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        return rows.slice(1)
            .filter(r => r[0])
            .map(r => ({ addr: String(r[0]).trim(), flag: String(r[1] || '').trim().toUpperCase() }));
    }

    function parseIndex(sheet) {
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        return rows.slice(1)
            .filter(r => r[0])
            .map(r => ({
                sheet: String(r[0]).trim(),
                title: String(r[1] || '').trim(),
                description: String(r[2] || '').trim(),
            }));
    }

    function colorFor(flag) {
        if (flag === 'TAK') return 'green';
        if (flag === 'NIE') return 'red';
        return 'red';
    }

    function drawOverlay(svg, rects, sheetData) {
        rects.forEach(r => {
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            rect.setAttribute('x', r.x);
            rect.setAttribute('y', r.y);
            rect.setAttribute('width', r.w);
            rect.setAttribute('height', r.h);
            const entry = sheetData.find(s => s.addr === r.addr);
            const color = colorFor(entry ? entry.flag : '');
            rect.setAttribute('class', 'rect ' + color);
            text.setAttribute('x', r.x + 1);
            text.setAttribute('y', r.y + 12);
            text.setAttribute('class', 'label');
            text.textContent = r.addr;
            svg.appendChild(rect);
            svg.appendChild(text);
        });
    }

    function renderMap(container, mapDef, rects, sheetData) {
        const section = document.createElement('div');
        section.className = 'map-section';

        const h2 = document.createElement('h2');
        h2.textContent = mapDef.title;
        section.appendChild(h2);

        if (mapDef.description) {
            const p = document.createElement('p');
            p.textContent = mapDef.description;
            section.appendChild(p);
        }

        const imgContainer = document.createElement('div');
        imgContainer.className = 'image-container';

        const img = document.createElement('img');
        img.src = 'background.png';

        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        imgContainer.appendChild(img);
        imgContainer.appendChild(svg);
        section.appendChild(imgContainer);
        container.appendChild(section);

        img.addEventListener('load', () => {
            svg.setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
            drawOverlay(svg, rects, sheetData);
        });
        if (img.complete) {
            svg.setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
            drawOverlay(svg, rects, sheetData);
        }
    }

    async function init() {
        const container = document.getElementById('maps');

        const [xlsxRes, mappingRes] = await Promise.all([
            fetch(sheetURL('xlsx'), { redirect: 'follow' }),
            fetch('mapping.json', { cache: 'no-store' }),
        ]);

        if (!xlsxRes.ok) throw new Error('Failed to fetch spreadsheet');
        if (!mappingRes.ok) throw new Error('mapping.json not found');

        const [xlsxBuf, mappingObj] = await Promise.all([
            xlsxRes.arrayBuffer(),
            mappingRes.json(),
        ]);

        const workbook = XLSX.read(xlsxBuf, { type: 'array' });
        const rects = Array.isArray(mappingObj.rects) ? mappingObj.rects : [];

        const indexSheet = workbook.Sheets['Index'];
        if (!indexSheet) throw new Error('No "Index" sheet found in spreadsheet');

        const maps = parseIndex(indexSheet);
        container.innerHTML = '';

        for (const mapDef of maps) {
            const dataSheet = workbook.Sheets[mapDef.sheet];
            if (!dataSheet) {
                const err = document.createElement('p');
                err.className = 'error';
                err.textContent = `Sheet "${mapDef.sheet}" not found`;
                container.appendChild(err);
                continue;
            }
            const sheetData = parseSheetData(dataSheet);
            renderMap(container, mapDef, rects, sheetData);
        }

        if (maps.length === 0) {
            container.innerHTML = '<p class="loading">No maps found in Index sheet.</p>';
        }
    }

    init().catch(e => {
        document.getElementById('maps').innerHTML = `<p class="error">${e.message}</p>`;
    });
</script>
</body>
</html>
